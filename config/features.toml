# Feature toggles for THIS brain.
#
# Read by scripts/features.py. The usual precedence applies — an env var overrides
# this file for a single command, and a missing key falls back to the built-in
# default, so an old brain without this file still works.
#
#   hybrid_search    — fuse lexical FTS5/BM25 with vector KNN via Reciprocal Rank
#                      Fusion (true). Set false for vector-only (pre-hybrid) search:
#                      the ablation baseline, or a fallback when FTS is unavailable.
#                      Env: SECOND_BRAIN_HYBRID_SEARCH=0|1
#   rrf_k            — RRF damping constant (60, the standard default); larger
#                      flattens the rank weighting. Env: SECOND_BRAIN_RRF_K=<int>
#   glossary_autolink — when true, the pre-commit hook links known glossary terms in
#                      each staged note before embedding it (edits the note's body).
#                      Off by default: opt in if you want commits to auto-link terms.
#                      (Adding a term with glossary_new.py links it regardless.)
#                      Env: SECOND_BRAIN_GLOSSARY_AUTOLINK=0|1
hybrid_search = true
rrf_k = 60
glossary_autolink = false

# PDF ingestion (scripts/add_pdf.py, scripts/pdf_config.py). Read only when you add a
# PDF; a brain that never ingests one ignores this block. See the README "Add a PDF".
#   inbox_dirs      — source folders to import from, priority order (first shown first).
#   list_sort       — order a folder's PDFs: "newest" (by modified time) or "alphabetical".
#   list_page_size  — how many entries to show before paginating.
#   chunk_tokens    — target passage size, in whitespace-word tokens (~512).
#   chunk_overlap   — fractional overlap between adjacent passages (0.15 = 15%).
#   result_mode     — passage shaping: "best_per_source" (one per PDF) or "all_chunks".
#   move_from_inbox — move (true) vs copy (false) the file out of its source folder.
#   NOTE on adding a system folder here: macOS keeps ~/Downloads, ~/Desktop and ~/Documents
#   behind per-app consent. A background process gets refused with no prompt to answer, so
#   such a folder reads as containing nothing. `python3 scripts/doctor.py` names one if you
#   add it. Prefer moving files into vault/inbox.
[pdf]
inbox_dirs      = ["vault/inbox"]
list_sort       = "newest"
list_page_size  = 20
chunk_tokens    = 512
chunk_overlap   = 0.15
result_mode     = "best_per_source"
move_from_inbox = true
